<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101a2b"/>
      <stop offset="1" stop-color="#0b1424"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.35" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#cfffff" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#cfffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="5" y="5" width="118" height="118" rx="25" fill="url(#bg)"/>
  <rect x="5" y="5" width="118" height="118" rx="25" fill="url(#sheen)"/>
  <rect x="14" y="14" width="100" height="100" rx="21" fill="none" stroke="#7ffcff" stroke-opacity="0.24"/>
  <g filter="url(#glow)">
    <text
      x="64"
      y="82"
      text-anchor="middle"
      font-family="Inter, Arial, sans-serif"
      font-size="50"
      font-weight="800"
      letter-spacing="-1.8"
      fill="#7ffcff"
    >$++</text>
  </g>
</svg>
