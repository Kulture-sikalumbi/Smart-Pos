<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#071427" />
      <stop offset="100%" stop-color="#020817" />
    </linearGradient>
    <radialGradient id="glow" cx="0.65" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <rect x="80" y="90" width="170" height="170" rx="40" fill="#0b1326" stroke="#67e8f9" stroke-opacity="0.3" />
  <text x="165" y="205" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="800" fill="#7ffcff" filter="url(#softGlow)">$++</text>

  <text x="300" y="170" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="4" fill="#a5f3fc">PROFIT MAKER POS</text>
  <text x="300" y="260" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="800" fill="#f8fafc">Built for Speed,</text>
  <text x="300" y="342" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="800" fill="#f8fafc">Profit, and Productivity.</text>
  <text x="300" y="415" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="500" fill="#cbd5e1">Modern restaurant point-of-sale software for real service pressure.</text>

  <rect x="300" y="470" width="390" height="68" rx="34" fill="#22d3ee" fill-opacity="0.2" stroke="#67e8f9" stroke-opacity="0.5" />
  <text x="495" y="514" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#cffafe">profitmakerpos.app</text>
</svg>
